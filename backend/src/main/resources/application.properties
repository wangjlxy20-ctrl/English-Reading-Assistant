spring.application.name=English-Reading-Assistant

server.port=8080


spring.datasource.url=jdbc:mysql://localhost:3306/english-reading-assistant?serverTimezone=Asia/Shanghai

spring.datasource.username=root

spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true

# Qian Wen API configuration
tongyi.api.key=your api key;
# fixed request URL
tongyi.api.url=https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation
# Using qwen-turbo
tongyi.model=qwen-turbo
# generation randomness
tongyi.temperature=0.3
# max output tokens
tongyi.max-token=2000